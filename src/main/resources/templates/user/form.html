<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh Sửa Người Dùng</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: url('/images/train01.jpg') center/cover no-repeat fixed;
        }

        .form-container {
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 40px;
            margin: 30px auto;
            max-width: 650px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        .page-title {
            font-weight: 700;
            font-size: 28px;
            color: #004a99;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
        }

        .user-profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #009ffd, #2a2a72);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .user-profile-info h5 {
            margin: 0;
            font-weight: 700;
            color: #333;
        }

        .user-profile-info small {
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }

        label i {
            margin-right: 5px;
            color: #004a99;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid #cfd9e0;
            width: 100%;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            background: rgba(255,255,255,0.8);
        }

        .form-control:focus, .form-select:focus {
            border-color: #004a99;
            box-shadow: 0 0 8px rgba(0,74,153,0.2);
            outline: none;
            background: #fff;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
        }

        .btn-success {
            background: linear-gradient(135deg, #009ffd, #2a2a72);
            color: #fff;
        }

        .btn-success:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .alert-danger {
            border-radius: 10px;
            font-weight: 600;
        }

        .form-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status-badge.active {
            background: rgba(40, 167, 69, 0.15);
            color: #28a745;
        }

        .status-badge.locked {
            background: rgba(220, 53, 69, 0.15);
            color: #dc3545;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="form-container">
        <h2 class="page-title">
            <i class="bi bi-pencil-square"></i>
            <span th:text="${user.id != null} ? 'Chỉnh Sửa Người Dùng' : 'Thêm Người Dùng'">Form</span>
        </h2>
        <p class="page-subtitle">Cập nhật thông tin tài khoản người dùng trong hệ thống</p>

        <!-- User profile header (only show when editing) -->
        <div th:if="${user.id != null}" class="user-profile-header">
            <div class="user-profile-avatar"
                 th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">A</div>
            <div class="user-profile-info">
                <h5 th:text="${user.fullName}">Tên người dùng</h5>
                <small th:text="'ID: ' + ${user.id} + ' • Ngày tạo: ' + (${user.createDate != null ? #temporals.format(user.createDate, 'dd/MM/yyyy') : 'N/A'})">Thông tin</small>
                <br/>
                <span th:if="${!user.locked}" class="status-badge active">
                    <i class="bi bi-check-circle-fill"></i> Đang hoạt động
                </span>
                <span th:if="${user.locked}" class="status-badge locked">
                    <i class="bi bi-lock-fill"></i> Đã bị khóa
                </span>
            </div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/users/save}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{createDate}">
            <input type="hidden" th:field="*{locked}">

            <div class="form-group">
                <label><i class="bi bi-envelope"></i> Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>

            <div class="form-group">
                <label><i class="bi bi-key"></i> Mật khẩu</label>
                <input type="password" th:field="*{password}" class="form-control" required>
                <p class="form-hint" th:if="${user.id != null}">Để trống nếu không muốn thay đổi mật khẩu</p>
            </div>

            <div class="form-group">
                <label><i class="bi bi-person"></i> Họ và Tên</label>
                <input type="text" th:field="*{fullName}" class="form-control" required>
            </div>

            <div class="form-group">
                <label><i class="bi bi-telephone"></i> Số Điện Thoại</label>
                <input type="tel" th:field="*{phone}" class="form-control" required>
            </div>

            <div class="form-group">
                <label><i class="bi bi-shield-check"></i> Vai Trò</label>
                <select th:field="*{role}" class="form-select" required>
                    <option th:each="role : ${roleTypes}" th:value="${role}" th:text="${role}"></option>
                </select>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-lg"></i> Lưu Thông Tin
                </button>
                <a th:href="@{/users}" class="btn btn-secondary">
                    <i class="bi bi-x-lg"></i> Hủy
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
